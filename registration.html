<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registration - Money-Back Ride</title>
    <style>
        body {
            background: url('https://raw.githubusercontent.com/StephanieToraldeSGT/Greenhills_ICT9Topaz_Q3Project_Toralde_Stephanie/refs/heads/main/vroom.jpg') center center/cover no-repeat fixed;
        }
        .my-registration {
            background-color: rgba(182, 255, 251, 0.95);
            margin: 50px auto;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            border: 10px solid cyan;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
        .footer {
            position: fixed;
            left: 0; bottom: 0; width: 100%;
            background-color: rgb(0, 45, 44);
            color: white; text-align: center; padding: 10px;
        }
    </style>
</head>
<body>

    <div class="my-registration">
        <div class="text-center">
            <img src="https://raw.githubusercontent.com/StephanieToraldeSGT/Greenhills_ICT9Topaz_Q3Project_Toralde_Stephanie/refs/heads/main/defaultpfp.png" style="width: 100px; border-radius: 50%;">
            <form action="upload.php" method="post" enctype="multipart/form-data" class="mt-2">
                <h6 style="font-family: monospace;">Profile picture</h6>
                <input type="file" name="fileToUpload" class="form-control form-control-sm mb-2">
                <button type="submit" class="btn btn-dark btn-sm">Upload Image</button>
            </form>
        </div>

        <hr>

        <form id="regForm">
            <h4 style="font-family: monospace;">Registration</h4>
            <p style="font-size: 0.8rem;">Please fill out all fields below.</p>

            <h6>First Name</h6>
            <input type="text" id="fname" placeholder="John" class="form-control mb-2">

            <h6>Last Name</h6>
            <input type="text" id="lname" placeholder="Doe" class="form-control mb-2">

            <h6>Username</h6>
            <input type="text" id="user" placeholder="johnthecool" class="form-control mb-2">

            <h6>Password</h6>
            <input type="password" id="pass" placeholder="********" class="form-control mb-3">

            <label class="mb-3">
                <input type="checkbox" id="terms"> I accept the Terms of Use and Privacy Policy
            </label>

            <div class="d-flex gap-2">
                <button type="button" onclick="to_register()" class="btn btn-warning" style="font-weight: bold;">Submit</button>
                <button type="reset" class="btn btn-secondary">Cancel</button>
            </div>
        </form>
    </div>

    <div class="footer">
        <p style="font-family: monospace; margin: 0;">Stephanie Toralde & Liam Tiong | 9-Topaz 2025-2026</p>
    </div>

    <script src="registration.js"></script>
</body>
</html>
