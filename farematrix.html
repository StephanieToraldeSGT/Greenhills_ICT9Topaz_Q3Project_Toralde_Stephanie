<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Fare Matrix</title>
    <style>
        body {
            background: url(https://raw.githubusercontent.com/StephanieToraldeSGT/Greenhills_ICT9Topaz_Q3Project_Toralde_Stephanie/refs/heads/main/vroom.jpg) center center/cover no-repeat fixed;
        }
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(0, 45, 44);
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        .my-box {
            background-color: rgba(182, 255, 251, 0.9); /* Added transparency to see background */
            margin: 50px auto;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            border-radius: 15px;
            border: 5px solid cyan;
            text-align: center;
        }
        .matrix-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-sm" style="background-color: rgb(0, 255, 242);">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">
                <img src="https://raw.githubusercontent.com/StephanieToraldeSGT/Greenhills_ICT9Topaz_Q3Project_Toralde_Stephanie/316467b9a3008821fd0a8b3d495cdc9b7982f8d6/Money-Back%20Ride.png" alt="Logo" height="35">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="farematrix.html" style="font-weight: bold;">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a style="color: black; margin-right: 15px;" href="https://www.rome2rio.com/s/Fernando-Poe-Jr-Station/Baclaran-Terminal-Station-LRT-Line-1" target="_blank">Book now!</a>
                    <button class="btn btn-warning" type="button" onclick="document.location='registration.html'">Create Account</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="my-box">
        <h1 style="font-family: monospace;">eSakayMo Fare Matrix</h1>
        <img src="https://raw.githubusercontent.com/StephanieToraldeSGT/Greenhills_ICT9Topaz_Q3Project_Toralde_Stephanie/refs/heads/main/rooseveltobaclaran.png" class="matrix-img" alt="Route Map">
        
        <div class="p-3">
            <label>From:</label>
            <select class="form-select d-inline-block w-auto" id="pickup"></select>

            <label class="ms-2">To:</label>
            <select class="form-select d-inline-block w-auto" id="dropoff"></select>

            <div class="mt-3">
                <label>Passenger Type:</label>
                <select class="form-select d-inline-block w-auto" id="passengerType">
                    <option value="1">Regular</option>
                    <option value="0.8">Student / Senior / PWD (20% off)</option>
                </select>
            </div>

            <button class="btn btn-info mt-4" onclick="calculateFare()">Calculate Fare</button>
            <h3 class="mt-4" style="font-family: monospace;" id="result"></h3>
        </div>
    </div>

    <div class="footer">
        <p style="font-family: monospace; margin: 0;">Stephanie Toralde & Liam Tiong | 9-Topaz @ OBMC Greenhills 2025-2026</p>
    </div>

    <script>

        basefare: 50;
        baseKM: 2;
        let perKMrate = basefare / baseKM;
        let totaldistance = 20;
        
        const stations = ["Roosevelt", "Balintawak", "Monumento", "5th Ave.", "R. Papa", "Abad Santos", "Blumentritt", "Tayuman", "Bambang", "Doroteo Jose", "Carriedo", "Central Terminal", "United Nations", "Pedro Gil", "Quirino", "Vito Cruz", "Gil Puyat", "Libertad", "EDSA", "Baclaran"];

        const fromSelect = document.getElementById("pickup");
        const toSelect = document.getElementById("dropoff");

        // Populate the dropdowns automatically
        stations.forEach((station, index) => {
            let option1 = new Option(station, index);
            let option2 = new Option(station, index);
            fromSelect.add(option1);
            toSelect.add(option2);
        });

        function calculateFare() {
            const startIdx = parseInt(fromSelect.value);
            const endIdx = parseInt(toSelect.value);
            const discount = parseFloat(document.getElementById("passengerType").value);
            
            // Calculate number of stations traveled
            const distance = Math.abs(endIdx - startIdx);
            
            if (distance === 0) {
                document.getElementById("result").innerHTML = "Please select different stations.";
                return;
            }

            // Simple Fare Logic: Base fare 15 + 2 per station (Adjust as needed)
            let totalFare = totaldistance * perKMrate (distance * 2);
            let discountedFare = totalFare * discount;

            document.getElementById("result").innerHTML = `Total Fare: ₱${discountedFare.toFixed(2)}`;
        }
    </script>
</body>
</html>
